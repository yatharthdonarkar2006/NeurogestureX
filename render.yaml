services:
  # Node.js Server
  - type: web
    name: hackathonix-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # Connect to your MongoDB cluster via Render Dashboard
      - key: FRONTEND_URL
        value: https://hackathonix-client.onrender.com

  # Python AI Server
  - type: web
    name: hackathonix-ai-server
    env: python
    rootDir: ai_server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  # React Client
  - type: web
    name: hackathonix-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://hackathonix-server.onrender.com/api
      - key: VITE_DEMO_MODE
        value: "false"
      - key: VITE_AI_SERVER_URL
        value: https://hackathonix-ai-server.onrender.com
      - key: VITE_AI_WS_URL
        value: wss://hackathonix-ai-server.onrender.com
